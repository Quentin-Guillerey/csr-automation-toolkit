name: Build PyInstaller artifacts

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean csr_automation_toolkit.spec

      - name: List dist (Linux)
        if: runner.os != 'Windows'
        run: |
          echo "Dist contents:"
          ls -la dist || true

      - name: List dist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Output "Dist contents:"
          if (Test-Path dist) { Get-ChildItem dist -Force } else { Write-Output "dist directory not found" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSR_Automation_Toolkit-${{ matrix.os }}
          path: dist/**
