name: Build PyInstaller artifacts

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]
        python: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ENTRY=csr_automation_toolkit.py
          OUT_NAME=csr_toolkit
          pyinstaller --noconfirm --clean --onefile --name $OUT_NAME \
            --add-data "csr_logs.csv:." \
            --hidden-import=tkinter --hidden-import=requests \
            --hidden-import=gspread --hidden-import=oauth2client \
            --hidden-import=openai "$ENTRY"

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ENTRY=csr_automation_toolkit.py
          OUT_NAME=csr_toolkit
          pyinstaller --noconfirm --clean --onefile --name $OUT_NAME \
            --add-data "csr_logs.csv;." \
            --hidden-import=tkinter --hidden-import=requests \
            --hidden-import=gspread --hidden-import=oauth2client \
            --hidden-import=openai "$ENTRY"

      - name: List dist
        run: |
          ls -la dist || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: csr-${{ matrix.os }}
          path: dist/**
